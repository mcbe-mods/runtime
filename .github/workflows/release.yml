name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      # =========================
      # 1. Checkout + Node + pnpm + install
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 等价 setup-js fetch-all: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # 2. Build（可选）
      # =========================
      - name: Build
        run: pnpm build
        if: ${{ hashFiles('pnpm-lock.yaml') != '' }}

      # =========================
      # 3. GitHub changelog（可选）
      # =========================
      - name: Generate GitHub Changelog
        run: pnpx changelogithub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # 4. Publish (monorepo aware)
      # =========================
      - name: Publish to npm
        run: |
          pnpm -r publish \
            --access public \
            --no-git-checks \
            --provenance
