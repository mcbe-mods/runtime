catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade
packages:
  - packages/*
catalogs:
  cli:
    '@antfu/eslint-config': ^8.2.0
    bumpp: ^11.1.0
    eslint: ^10.2.1
    lint-staged: ^16.4.0
    publint: ^0.3.18
    simple-git-hooks: ^2.13.1
    tsdown: ^0.21.10
    typescript: ^6.0.3
  deps:
    '@minecraft/server': ~1.18.0
    lz-string: ^1.5.0
    mini-emit: 1.0.0-beta.0
    tinydateformat2: ^1.0.0
  testing:
    tsdown-stale-guard: ^0.1.1
    tsnapi: ^0.3.2
    vitest: ^4.1.5
  types:
    '@types/lz-string': ^1.5.0
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
